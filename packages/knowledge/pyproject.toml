[project]
name = "newsletter-knowledge"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "newsletter-core",
    "beautifulsoup4>=4.12",
    "chromadb>=0.6",
    "camoufox>=0.4.11",
    "markdownify>=1.2.2",
    "httpx>=0.28.1",
    "pyyaml>=6.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knowledge"]

[tool.uv.sources]
newsletter-core = { workspace = true }
