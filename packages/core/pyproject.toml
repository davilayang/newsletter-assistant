[project]
name = "newsletter-core"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic-settings>=2.0.3",
    "pydantic>=2.4.2",
    "google-auth==2.47.0",
    "google-auth-oauthlib==1.2.4",
    "google-api-python-client==2.188.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
