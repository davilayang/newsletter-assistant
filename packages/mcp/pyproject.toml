[project]
name = "newsletter-mcp"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "newsletter-core",
    "mcp[cli]>=1.25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp"]

[tool.uv.sources]
newsletter-core = { workspace = true }
