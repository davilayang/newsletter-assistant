apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: newsletter

resources:
  - namespace.yaml
  - pvc.yaml
  - agent/deployment.yaml
  - pipeline/cronjob.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/ingress.yaml
  - cert-manager/cluster-issuer.yaml

# ConfigMap generated from config/ files — no copy-paste needed.
# Edit ../config/*.yaml and re-apply to update.
configMapGenerator:
  - name: newsletter-config
    files:
      - newsletters.yaml=../config/newsletters.yaml
      - speech_replacements.yaml=../config/speech_replacements.yaml

# Secret generated from k8s/secret.env (gitignored).
# cp k8s/secret.env.template k8s/secret.env, fill in values, then apply.
secretGenerator:
  - name: newsletter-env
    envs:
      - secret.env

# Image overrides — replace OWNER with your Docker Hub username.
# These names are referenced in the Deployment/CronJob manifests;
# Kustomize rewrites them to the full registry path on apply.
images:
  - name: newsletter-agent
    newName: docker.io/OWNER/newsletter-agent
    newTag: latest
  - name: newsletter-pipeline
    newName: docker.io/OWNER/newsletter-pipeline
    newTag: latest
  - name: newsletter-frontend
    newName: docker.io/OWNER/newsletter-frontend
    newTag: latest
