apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: newsletter-frontend
  namespace: newsletter
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts:
        - SERVER_IP.sslip.io    # replaced at deploy time via sed
      secretName: newsletter-frontend-tls
  rules:
    - host: SERVER_IP.sslip.io  # replaced at deploy time via sed
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: newsletter-frontend
                port:
                  number: 80
